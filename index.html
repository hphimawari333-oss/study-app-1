<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>学習×カワウソ育成アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family:sans-serif; background:#eef; padding:10px;}
.card { background:#fff; padding:12px; margin:10px 0; border-radius:10px;}
button { padding:10px; margin:5px; border:none; border-radius:8px; background:#4CAF50; color:#fff;}
input { padding:8px; margin:5px;}
.center { text-align:center;}
.bad {color:red;}
</style>
</head>
<body>

<h2>📚 学習サイクル</h2>

<div class="card center">
<h3>🦦 カワウソ</h3>
<img id="otterImg" width="140">
<p id="otterLevel"></p>
</div>

<div class="card">
<p>モード：<b id="mode"></b></p>
</div>

<div class="card">
<h3>① テスト結果</h3>
<input type="number" id="score" placeholder="点数">
<button onclick="saveTest()">保存</button>
</div>

<div class="card">
<h3>❌ 間違い</h3>
<div id="mistakes"></div>
</div>

<div class="card">
<h3>🔥 負けパターン</h3>
<div id="patterns"></div>
</div>

<div class="card">
<h3>✏️ 問題</h3>
<div id="quiz"></div>
</div>

<div class="card">
<h3>🎁 シール</h3>
<p id="stickers"></p>
</div>

<script>
let data = JSON.parse(localStorage.getItem("studyApp")) || {
  mode:"input",
  stickers:0,
  mistakes:[],
  patterns:{}
};

function save(){
  localStorage.setItem("studyApp", JSON.stringify(data));
  render();
}

function setMode(m){
  data.mode = m;
  save();
}

function getSticker(score){
  if(score==100) return 5;
  if(score>=90) return 3;
  if(score>=70) return 2;
  if(score>=50) return 1;
  return 0;
}

function randomPattern(){
  const list=["計算ミス","単位ミス","読解ミス","ケアレスミス","理解不足"];
  return list[Math.floor(Math.random()*list.length)];
}

function saveTest(){
  let score = Number(document.getElementById("score").value);

  if(isNaN(score)||score<0||score>100){
    alert("0〜100で入力");
    return;
  }

  let missCount = Math.floor((100-score)/20);

  for(let i=0;i<missCount;i++){
    let p = randomPattern();
    data.mistakes.push({type:p, solved:false});
    data.patterns[p]=(data.patterns[p]||0)+1;
  }

  data.pendingSticker = getSticker(score);
  document.getElementById("score").value="";
  setMode("retry");
}

function getOtter(){
  let s = data.stickers;

  if(s < 10){
    return {
      img:"https://i.imgur.com/8Q1Z6yT.png",
      text:"赤ちゃんカワウソ"
    };
  }

  if(s < 30){
    return {
      img:"https://i.imgur.com/2qg7XnL.png",
      text:"成長カワウソ"
    };
  }

  return {
    img:"https://i.imgur.com/6k9YpRk.png",
    text:"スーパーカワウソ"
  };
}

function render(){
  document.getElementById("mode").innerText = data.mode;
  document.getElementById("stickers").innerText = data.stickers;

  let o = getOtter();
  document.getElementById("otterImg").src = o.img;
  document.getElementById("otterLevel").innerText = o.text;

  let m="";
  data.mistakes.forEach(x=>{
    if(!x.solved) m+="<p class='bad'>"+x.type+"</p>";
  });
  document.getElementById("mistakes").innerHTML=m;

  let p="";
  Object.entries(data.patterns)
  .sort((a,b)=>b[1]-a[1])
  .forEach(x=> p+="<p>"+x[0]+" : "+x[1]+"</p>");
  document.getElementById("patterns").innerHTML=p;

  generateQuiz();
}

function generateQuiz(){
  if(data.mode==="input"){
    document.getElementById("quiz").innerHTML="";
    return;
  }

  let targets = [];

  if(data.mode==="retry"){
    targets = data.mistakes.filter(x=>!x.solved);
  } else {
    targets = Array(3).fill(0);
  }

  let q="";
  targets.slice(0,3).forEach((t,i)=>{
    let a = Math.floor(Math.random()*10);
    let b = Math.floor(Math.random()*10);
    let ans = a+b;

    q+=`
    <div>
      ${a}+${b}=
      <input id="q${i}">
      <button onclick="check(${i},${ans})">OK</button>
    </div>`;
  });

  document.getElementById("quiz").innerHTML=q;
}

function check(i,ans){
  let val = document.getElementById("q"+i).value;

  if(Number(val)==ans){

    if(data.mode==="retry"){
      let unsolved = data.mistakes.filter(x=>!x.solved);
      if(unsolved[i]) unsolved[i].solved=true;

      if(data.mistakes.every(x=>x.solved)){
        alert("全部クリア！");
        setMode("check");
        return;
      }
    }

    if(data.mode==="check"){
      alert("理解OK！");
      setMode("final");
      return;
    }

    if(data.mode==="final"){
      data.stickers += data.pendingSticker||0;
      alert("シールGET🎉");
      data.mode="input";
      data.mistakes=[];
      save();
      return;
    }

  } else {
    let p = randomPattern();
    data.mistakes.push({type:p, solved:false});
    data.patterns[p]=(data.patterns[p]||0)+1;
    alert("ミス！");
    save();
  }
}

render();
</script>

</body>
</html>
