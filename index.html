<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>学習×カワウソ育成アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family:sans-serif; background:#eef; padding:10px;}
.card { background:#fff; padding:12px; margin:10px 0; border-radius:10px;}
button { padding:10px; margin:5px; border:none; border-radius:8px; background:#4CAF50; color:#fff;}
input { padding:8px; margin:5px;}
.center { text-align:center;}
.bad {color:red;}
</style>
</head>
<body>

<h2>📚 学習サイクル</h2>

<div class="card center">
<h3>🦦 カワウソ</h3>
<img id="otterImg" width="140">
<p id="otterLevel"></p>
</div>

<div class="card">
<p>モード：<b id="mode"></b></p>
</div>

<div class="card">
<h3>① テスト結果</h3>
<input type="number" id="score" placeholder="点数">
<button onclick="saveTest()">保存</button>
</div>

<div class="card">
<h3>❌ 間違い</h3>
<div id="mistakes"></div>
</div>

<div class="card">
<h3>🔥 負けパターン</h3>
<div id="patterns"></div>
</div>

<div class="card">
<h3>✏️ 問題</h3>
<div id="quiz"></div>
</div>

<div class="card">
<h3>🎁 シール</h3>
<p id="stickers"></p>
</div>

<script>
let data = JSON.parse(localStorage.getItem("studyApp")) || {
  mode:"input",
  stickers:0,
  mistakes:[],
  patterns:{}
};

function save(){
  localStorage.setItem("studyApp", JSON.stringify(data));
  render();
}

function setMode(m){
  data.mode = m;
  save();
}

function getSticker(score){
  if(score==100) return 5;
  if(score>=90) return 3;
  if(score>=70) return 2;
  if(score>=50) return 1;
  return 0;
}

function randomPattern(){
  const list=["計算ミス","単位ミス","読解ミス","ケアレスミス","理解不足"];
  return list[Math.floor(Math.random()*list.length)];
}

function saveTest(){
  let score = Number(document.getElementById("score").value);

  if(isNaN(score)||score<0||score>100){
    alert("0〜100で入力");
    return;
  }

  let missCount = Math.floor((100-score)/20);

  for(let i=0;i<missCount;i++){
    let p = randomPattern();
    data.mistakes.push({type:p, solved:false});
    data.patterns[p]=(data.patterns[p]||0)+1;
  }

  data.pendingSticker = getSticker(score);
  document.getElementById("score").value="";
  setMode("retry");
}

function getOtter(){
  let s = data.stickers;

  if(s < 10){
    return {
      img:"https://i.imgur.com/8Q1Z6yT.png",
      text:"赤ちゃんカワウソ"
    };
  }

  if(s < 30){
    return {
      img:"https://i.imgur.com/2qg7XnL.png",
      text:"成長カワウソ"
    };
  }

  return {
    img:"https://i.imgur.com/6k9YpRk.png",
    text:"スーパーカワウソ"
  };
}

function render(){
  document.getElementById("mode").innerText = data.mode;
  document.getElementById("stickers").innerText = data.stickers;

  let o = getOtter();
  document.getElementById("otterImg").src = o.img;
  document.getElementById("otterLevel").innerText = o.text;

  let m="";
  data.mistakes.forEach(x=>{
    if(!x.solved) m+="<p class='bad'>"+x.type+"</p>";
  });
  document.getElementById("mistakes").innerHTML=m;

  let p="";
  Object.entries(data.patterns)
  .sort((a,b)=>b[1]-a[1])
  .forEach(x=> p+="<p>"+x[0]+" : "+x[1]+"</p>");
  document.getElementById("patterns").innerHTML=p;

  generateQuiz();
}

function generateQuiz(){
  if(data.mode==="input"){
    document.getElementById("quiz").innerHTML="";
    return;
  }

  let targets = [];

  if(data.mode==="retry"){
    targets = data.mistakes.filter(x=>!x.solved);
  } else {
    targets = Array(3).fill(0);
  }

  let q="";
  targets.slice(0,3).forEach((t,i)=>{
    let a = Math.floor(Math.random()*10);
    let b = Math.floor(Math.random()*10);
    let ans = a+b;

    q+=`
    <div>
      ${a}+${b}=
      <input id="q${i}">
      <button onclick="check(${i},${ans})">OK</button>
    </div>`;
  });

  document.getElementById("quiz").innerHTML=q;
}

function check(i,ans){
  let val = document.getElementById("q"+i).value;

  if(Number(val)==ans){

    if(data.mode==="retry"){
      let unsolved = data.mistakes.filter(x=>!x.solved);
      if(unsolved[i]) unsolved[i].solved=true;

      if(data.mistakes.every(x=>x.solved)){
        alert("全部クリア！");
        setMode("check");
        return;
      }
    }

    if(data.mode==="check"){
      alert("理解OK！");
      setMode("final");
      return;
    }

    if(data.mode==="final"){
      data.stickers += data.pendingSticker||0;
      alert("シールGET🎉");
      data.mode="input";
      data.mistakes=[];
      save();
      return;
    }

  } else {
    let p = randomPattern();
    data.mistakes.push({type:p, solved:false});
    data.patterns[p]=(data.patterns[p]||0)+1;
    alert("ミス！");
    save();
  }
}

render();
</script>

</body>
</html>
<!-- ▼ 追加UI -->
<select id="subject">
  <option value="英語">英語</option>
  <option value="数学">数学</option>
  <option value="国語">国語</option>
</select>

<div id="history"></div>

<script>
// ▼ 教科切り替え
document.getElementById("subject").addEventListener("change", (e)=>{
  render(e.target.value);
});

// ▼ 履歴表示
function renderHistory(subject) {
  const scores = data[subject];
  if (!scores) return;

  const list = scores.map(s => {
    const d = new Date(s.date);
    return `${d.toLocaleDateString()} : ${s.score}`;
  }).join("<br>");

  document.getElementById("history").innerHTML =
    "<h4>履歴</h4>" + list;
}

// ▼ renderの最後に必ず追加
const _originalRender = render;
render = function(subject){
  _originalRender(subject);
  renderHistory(subject);
};

// ▼ レベルアップ演出（上書き）
grow = function(state) {
  if (state === "good") {
    otterLevel++;
    speak("レベルアップ！");
    alert("🦦 レベルアップ！");
  }
};

// ▼ サボりチェック
function checkIdle() {
  const last = localStorage.getItem("lastStudy");
  if (!last) return;

  const diff = (Date.now() - last) / (1000*60*60*24);

  if (diff >= 2) {
    document.getElementById("otter").innerText =
      "🦦 元気ない…";
  }
}

// ▼ addScoreの最後に必ず追加されるようフック
const _originalAddScore = addScore;
addScore = function(){
  _originalAddScore();
  localStorage.setItem("lastStudy", Date.now());
};

// ▼ 初期実行
checkIdle();
</script>
<!-- ▼ 画像取り込み -->
<input type="file" id="imageInput" accept="image/*">
<button onclick="processImage()">画像読み取り</button>

<!-- ▼ 読み取り結果（編集可能） -->
<div id="ocrArea" style="display:none;">
  <h4>読み取り結果（修正してOK）</h4>
  <textarea id="ocrText" style="width:100%;height:120px;"></textarea>
  <br>
  <button onclick="applyOCR()">この内容で反映</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
// ====== OCR実行 ======
async function processImage(){
  const file = document.getElementById("imageInput").files[0];
  if(!file) return alert("画像を選んで");

  document.getElementById("ocrText").value = "読み取り中...";
  document.getElementById("ocrArea").style.display = "block";

  const { data: { text } } = await Tesseract.recognize(
    file,
    'jpn+eng'
  );

  document.getElementById("ocrText").value = text;
}

// ====== OCR結果を解析して反映 ======
function applyOCR(){
  const text = document.getElementById("ocrText").value;

  // ▼ 超シンプル抽出（例：英語 80）
  const lines = text.split("\n");

  lines.forEach(line=>{
    const match = line.match(/(英語|数学|国語)\s*[:：]?\s*(\d+)/);

    if(match){
      const subject = match[1];
      const score = Number(match[2]);

      if(!data[subject]) data[subject] = [];

      data[subject].push({
        score,
        date: Date.now()
      });
    }
  });

  localStorage.setItem("scores", JSON.stringify(data));

  speak("読み取ったよ。確認ありがとう！");
  alert("反映完了");

  render(document.getElementById("subject").value);
}
</script>
<button onclick="runAnalysis()">分析する</button>

<div id="analysisResult"></div>
<div id="actionPlan"></div>
<div id="nextQuestion"></div>

<script>
// ====== 分析 ======
function runAnalysis(){
  const subject = document.getElementById("subject").value;
  const list = data[subject] || [];

  if(list.length === 0){
    alert("データがないよ");
    return;
  }

  const scores = list.map(x=>x.score);
  const avg = scores.reduce((a,b)=>a+b,0) / scores.length;
  const latest = scores[scores.length - 1];
  const diff = latest - avg;

  // ====== 傾向判定 ======
  let status = "";
  if(avg >= 80){
    status = "安定している";
  }else if(avg >= 60){
    status = "伸び途中";
  }else{
    status = "基礎不足";
  }

  // ====== 問題提起 ======
  let issue = "";
  if(diff < -10){
    issue = "直近の成績が落ちている。理解が曖昧な可能性あり";
  }else if(avg < 60){
    issue = "基礎理解が不足している";
  }else{
    issue = "あと一歩で安定圏";
  }

  // ====== 行動提案 ======
  let action = "";
  if(avg < 60){
    action = "基礎問題を3問やろう";
  }else if(diff < 0){
    action = "間違えた範囲を復習しよう";
  }else{
    action = "応用問題に挑戦してみよう";
  }

  // ====== 問題生成 ======
  const question = generateSmartQuestion(subject, avg);

  // ====== 表示 ======
  document.getElementById("analysisResult").innerHTML =
    `平均：${avg.toFixed(1)}点<br>
     状態：${status}<br>
     課題：${issue}`;

  document.getElementById("actionPlan").innerHTML =
    `👉 次にやること：${action}`;

  document.getElementById("nextQuestion").innerHTML =
    `📝 問題：${question}`;

  speak("分析したよ。一緒に次やろう");
}

// ====== 賢い問題生成 ======
function generateSmartQuestion(subject, avg){

  if(subject === "数学"){
    if(avg < 60){
      return "2x + 3 = 7 を解け";
    }else{
      return "二次関数 y = x^2 の頂点を求めよ";
    }
  }

  if(subject === "英語"){
    if(avg < 60){
      return "I ___ to school yesterday. (go)";
    }else{
      return "関係代名詞を使って文を作れ";
    }
  }

  if(subject === "国語"){
    if(avg < 60){
      return "主語と述語を見つけよ";
    }else{
      return "筆者の主張を要約せよ";
    }
  }

  return "問題生成失敗";
}
</script>
<div>
  <h2>📊 テスト入力</h2>
  <input type="number" id="scoreInput" placeholder="点数入力">
  <button onclick="submitScore()">確定</button>

  <h3>📈 分析</h3>
  <div id="analysis"></div>

  <h3>❗課題</h3>
  <div id="issue"></div>

  <h3>📝 問題</h3>
  <div id="question"></div>

  <h3>🎖 シール</h3>
  <div id="bigSticker">大シール：0</div>
  <div id="smallSticker">小シール：0</div>
</div>

<script>
// =======================
// データ保存
// =======================
let history = JSON.parse(localStorage.getItem("history")) || [];
let stickers = JSON.parse(localStorage.getItem("stickers")) || {
  big: 0,
  small: 0
};

// =======================
// スコア登録
// =======================
function submitScore(){
  const score = Number(document.getElementById("scoreInput").value);
  if(!score) return;

  history.push(score);
  localStorage.setItem("history", JSON.stringify(history));

  analyze();
  generateIssue();
  generateQuestion();
  convertScoreToSticker(score);
}

// =======================
// 分析
// =======================
function analyze(){
  if(history.length < 2){
    document.getElementById("analysis").innerText = "データ不足";
    return;
  }

  const last = history[history.length - 1];
  const prev = history[history.length - 2];
  const diff = last - prev;

  let msg = `前回との差：${diff}`;

  if(diff > 0){
    msg += "（成長）";
  } else if(diff < 0){
    msg += "（下降）";
  }

  document.getElementById("analysis").innerText = msg;
}

// =======================
// 課題抽出
// =======================
let currentIssue = "";

function generateIssue(){
  const score = history[history.length - 1];

  if(score < 70){
    currentIssue = "基礎理解が不足";
  } else if(score < 90){
    currentIssue = "ミスが多い";
  } else if(score < 100){
    currentIssue = "ケアレスミス対策";
  } else {
    currentIssue = "満点維持";
  }

  document.getElementById("issue").innerText = currentIssue;
}

// =======================
// 問題生成（簡易）
// =======================
function generateQuestion(){
  let q = "";

  if(currentIssue.includes("基礎")){
    q = "基本問題を解こう";
  } else if(currentIssue.includes("ミス")){
    q = "見直し問題";
  } else {
    q = "応用問題";
  }

  document.getElementById("question").innerText = q;
}

// =======================
// シール変換
// =======================
function convertScoreToSticker(score){

  let big = 0;
  let small = 0;

  if(score === 100){
    big = 3;
    small = 2;
  } else if(score >= 90){
    big = 2;
    small = 2;
  } else if(score >= 80){
    big = 1;
    small = 2;
  } else if(score >= 70){
    small = 2;
  } else if(score >= 60){
    small = 1;
  }

  stickers.big += big;
  stickers.small += small;

  localStorage.setItem("stickers", JSON.stringify(stickers));

  updateStickerUI();
}

// =======================
// 表示更新
// =======================
function updateStickerUI(){
  document.getElementById("bigSticker").innerText = "大シール：" + stickers.big;
  document.getElementById("smallSticker").innerText = "小シール：" + stickers.small;
}

// 初期表示
updateStickerUI();
</script>
